name: Update books index

on:
  push:
    paths:
      - "books/**/*.pdf"
      - "scripts/generate_books_index.py"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate books index
        run: python scripts/generate_books_index.py

      - name: Commit updated README
        run: |
          if git diff --quiet README.md; then
            echo "README.md is already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update books index"
            git push
          fi
